services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: marksuser
      POSTGRES_PASSWORD: markspass
      POSTGRES_DB: marksdb
    # Pre-seed script is required as a volume to load mock database
    # Data inside the container is lost on restart unless you persist it with a volume.
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    # TODO: you will need to add to this
    build: ./backend
    depends_on:
      - db
    ports:
      - "5000:5000"
    environment:
      - DB_HOST=db
      - DB_NAME=marksdb
      - DB_USER=marksuser
      - DB_PASSWORD=markspass

  frontend:
    # TODO: you will need to add to this
    build: 
      context: ./frontend
      args:
        - VITE_API_URL=http://backend:5000
    depends_on:
      - backend
    ports:
      - "8080:80"

  automark:
    build: ./automark
    depends_on:
      - backend
      - db
    profiles:
      - debug

volumes:
  db_data:
